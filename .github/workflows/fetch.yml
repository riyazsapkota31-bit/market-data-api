name: Fetch Market Data (every minute via cron-job.org)

on:
  repository_dispatch:
    types: [cron-job]          # called by cron-job.org every minute
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run data sync
        run: node fetch-prices.js
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update minute snapshots [skip ci]"
          git push
